      /* ================= AUTOMATIC VERTICAL ZIG-ZAG GENERATOR (ACCESSIBLE) ================= */
      function generateDynamicLevel(levelNumber) {
        // 1. Δημιουργία άδειου χάρτη με περιμετρικούς τοίχους
        let map = [];
        for (let r = 0; r < MAP_ROWS; r++) {
          map[r] = [];
          for (let c = 0; c < MAP_COLS; c++) {
            if (r === 0 || c === 0 || c === MAP_COLS - 1) {
              map[r][c] = 1;
            } else {
              map[r][c] = 0;
            }
          }
        }

        // 2. Πλατφόρμα εκκίνησης (Safe Zone) κάτω αριστερά
        for (let c = 1; c <= 6; c++) {
          map[MAP_ROWS - 2][c] = 1;
        }

        // 3. Ορισμός Υψών για τους 3 Ορόφους (Διαφορά 3 blocks αντί για 4)
        // 1ος όροφος: row 12, 2ος όροφος: row 9, 3ος όροφος: row 6
        let floor1 = MAP_ROWS - 3; // 12
        let floor2 = floor1 - 3; // 9
        let floor3 = floor2 - 3; // 6

        // --- ΟΡΟΦΟΣ 1: Κίνηση προς τα ΔΕΞΙΑ ---
        let curX = 7;
        while (curX < MAP_COLS - 6) {
          let w = Math.floor(Math.random() * 2) + 2; // πλάτος 2-3
          let hJump = Math.floor(Math.random() * 2); // 0 ή 1 για μικρή ποικιλία
          for (let i = 0; i < w; i++) {
            if (curX + i < MAP_COLS - 5) map[floor1 + hJump][curX + i] = 1;
          }
          curX += w + Math.floor(Math.random() * 2) + 1; // κενό 1-2 blocks
        }

        // === ΣΚΑΛΑ ΣΥΝΔΕΣΗΣ: ΑΠΟ ΟΡΟΦΟ 1 ΣΕ ΟΡΟΦΟ 2 (Τέρμα Δεξιά) ===
        // Φτιάχνουμε σκαλοπάτια που ανεβαίνουν ομαλά προς τα αριστερά για να μπει ο παίκτης στον 2ο όροφο
        map[floor1 - 1][MAP_COLS - 3] = 1; // Πρώτο σκαλοπάτι
        map[floor1 - 2][MAP_COLS - 5] = 1; // Δεύτερο σκαλοπάτι
        map[floor2][MAP_COLS - 4] = 1; // Αρχή του 2ου ορόφου
        map[floor2][MAP_COLS - 3] = 1;

        // --- ΟΡΟΦΟΣ 2: Κίνηση προς τα ΑΡΙΣΤΕΡΑ ---
        curX = MAP_COLS - 6;
        while (curX > 6) {
          let w = Math.floor(Math.random() * 2) + 2;
          let hJump = Math.floor(Math.random() * 2);
          for (let i = 0; i < w; i++) {
            if (curX - i > 4) map[floor2 + hJump][curX - i] = 1;
          }
          curX -= w + Math.floor(Math.random() * 2) + 1;
        }

        // === ΣΚΑΛΑ ΣΥΝΔΕΣΗΣ: ΑΠΟ ΟΡΟΦΟ 2 ΣΕ ΟΡΟΦΟ 3 (Τέρμα Αριστερά) ===
        // Σκαλοπάτια για να ανέβει ο παίκτης στον τελευταίο όροφο
        map[floor2 - 1][2] = 1;
        map[floor2 - 2][4] = 1;
        map[floor3][3] = 1;
        map[floor3][2] = 1;

        // --- ΟΡΟΦΟΣ 3: Κίνηση ξανά προς τα ΔΕΞΙΑ (Εκεί είναι η πόρτα) ---
        curX = 5;
        let lastX = 5;
        while (curX < MAP_COLS - 4) {
          let w = Math.floor(Math.random() * 2) + 3; // πλάτος 3-4 blocks
          let hJump = Math.floor(Math.random() * 2);
          for (let i = 0; i < w; i++) {
            if (curX + i < MAP_COLS - 2) map[floor3 + hJump][curX + i] = 1;
          }
          lastX = curX + Math.floor(w / 2);
          curX += w + Math.floor(Math.random() * 2) + 1;
        }

        // 4. Αυτόματη δημιουργία νομισμάτων
        let coins = [];
        for (let r = 2; r < MAP_ROWS - 1; r++) {
          for (let c = 2; c < MAP_COLS - 2; c++) {
            if (map[r][c] === 1 && Math.random() < 0.12) {
              if (map[r - 1][c] === 0) {
                coins.push({ x: c + 0.5, y: r - 1.2 });
              }
            }
          }
        }

        // 5. Η πόρτα στο τέλος του 3ου ορόφου
        let doorX = lastX;
        let doorY = floor3 - 1.6;
        if (map[floor3 + 1][Math.floor(lastX)] === 1) doorY += 1;

        // 6. Γεννήτρια Γρίφων
        let num1 = Math.floor(Math.random() * (levelNumber * 2)) + 3;
        let num2 = Math.floor(Math.random() * (levelNumber * 2)) + 2;
        let correctAns = num1 * num2;
        let wrongAns = correctAns + (Math.random() > 0.5 ? 4 : -4);
        if (wrongAns === correctAns) wrongAns += 3;
        let isCorrectA = Math.random() > 0.5;

        let puzzle = {
          title: `ΛΑΒΥΡΙΝΘΟΣ ΖΙΚ-ΖΑΚ (LEVEL ${levelNumber})`,
          line1: `Φτάσατε στην κορυφή του ορόφου!`,
          line2: `Λύστε το: ${num1} x ${num2} = ?`,
          optA: isCorrectA ? String(correctAns) : String(wrongAns),
          optB: isCorrectA ? String(wrongAns) : String(correctAns),
          correct: isCorrectA ? "A" : "B",
        };

        return {
          map: map,
          playerStart: { x: 2.5, y: MAP_ROWS - 3.5 },
          door: { x: doorX, y: doorY },
          coins: coins,
          puzzle: puzzle,
        };
      }

      /* ================= MAP ================= */
      class GameMap {
        constructor() {
          this.data = [];
        }
        load(matrix) {
          this.data = matrix;
        }
        isWall(x, y) {
          const c = Math.floor(x);
          const r = Math.floor(y);
          if (r < 0 || r >= MAP_ROWS || c < 0 || c >= MAP_COLS) return true;
          return this.data[r][c] === 1;
        }
        draw(ctx, tile) {
          for (let r = 0; r < MAP_ROWS; r++) {
            for (let c = 0; c < MAP_COLS; c++) {
              ctx.fillStyle = this.data[r][c] ? "#555" : "#2a7";
              ctx.fillRect(c * tile, r * tile, tile, tile);
            }
          }
        }
      }

      /* ================= PLAYER ================= */
      class Player {
        constructor() {
          this.x = 0;
          this.y = 0;
          this.w = 0.7; // από 0.5
          this.h = 1; // από 0.9
          this.speed = 5;
          this.vx = 0;
          this.vy = 0;
          this.gravity = 15;
          this.jumpForce = -10;
          this.grounded = false;
          this.direction = "right";
          this.isMoving = false;
          this.frameIndex = 0;
          this.frameTimer = 0;
          this.frameSpeed = 0.1;
          this.totalFrames = 8;
        }
        spawn(x, y) {
          this.x = x;
          this.y = y;
          this.vx = 0;
          this.vy = 0;
        }
        updatePhysics(dir, map, dt) {
          this.vx = dir.x * this.speed;
          this.vy += this.gravity * dt;
          if (dir.x > 0) {
            this.direction = "right";
            this.isMoving = true;
          } else if (dir.x < 0) {
            this.direction = "left";
            this.isMoving = true;
          } else {
            this.isMoving = false;
          }

          this.x += this.vx * dt;
          if (this.vx > 0) {
            if (
              map.isWall(this.x + this.w, this.y) ||
              map.isWall(this.x + this.w, this.y + this.h - 0.05)
            )
              this.x = Math.floor(this.x + this.w) - this.w;
          } else if (this.vx < 0) {
            if (
              map.isWall(this.x, this.y) ||
              map.isWall(this.x, this.y + this.h - 0.05)
            )
              this.x = Math.floor(this.x) + 1;
          }

          this.y += this.vy * dt;
          this.grounded = false;
          if (this.vy > 0) {
            if (
              map.isWall(this.x, this.y + this.h) ||
              map.isWall(this.x + this.w - 0.05, this.y + this.h)
            ) {
              this.y = Math.floor(this.y + this.h) - this.h;
              this.vy = 0;
              this.grounded = true;
            }
          } else if (this.vy < 0) {
            if (
              map.isWall(this.x, this.y) ||
              map.isWall(this.x + this.w - 0.05, this.y)
            ) {
              this.y = Math.floor(this.y) + 1;
              this.vy = 0;
            }
          }
          if (dir.jump && this.grounded) {
            this.vy = this.jumpForce;
            this.grounded = false;
          }
          this.frameTimer += dt;
          if (this.frameTimer >= this.frameSpeed) {
            this.frameTimer = 0;
            this.frameIndex = (this.frameIndex + 1) % this.totalFrames;
          }
        }
        draw(ctx, tile) {
          let currentImg = this.isMoving
            ? this.direction === "right"
              ? sprites.runRight
              : sprites.runLeft
            : this.direction === "right"
              ? sprites.idleRight
              : sprites.idleLeft;
          const TARGET_WIDTH = 2.5;
          const TARGET_HEIGHT = TARGET_WIDTH * (80 / 96);
          const renderX = (this.x - 0.95) * tile;
          const renderY = (this.y + this.h - TARGET_HEIGHT + 0.56) * tile;
          ctx.drawImage(
            currentImg,
            this.frameIndex * 96,
            0,
            96,
            80,
            renderX,
            renderY,
            TARGET_WIDTH * tile,
            TARGET_HEIGHT * tile,
          );
        }
      }

        initTouchControls() {

          const knob = document.getElementById("knob");
          const jumpBtn = document.getElementById("jump-btn");
          if (!("ontouchstart" in window || navigator.maxTouchPoints > 0))
            return;
          touchContainer.style.display = "block";
          let joystickRect,
            maxDrag = 40;
          let joystickTouchId = null,
            jumpTouchId = null;
          const handleMove = (touch) => {
            let dx =
              touch.clientX - (joystickRect.left + joystickRect.width / 2);
            let dy =
              touch.clientY - (joystickRect.top + joystickRect.height / 2);
            const d = Math.hypot(dx, dy);
            if (d > maxDrag) {
              dx = (dx / d) * maxDrag;
              dy = (dy / d) * maxDrag;
            }
            knob.style.transform = `translate(${dx}px, ${dy}px)`;
            const rx = dx / maxDrag;
            this.touchX = rx > 0.3 ? 1 : rx < -0.3 ? -1 : 0;
          };
          joystick.addEventListener(
            "touchstart",
            (e) => {
              if (joystickTouchId !== null) return;
              const t = e.changedTouches[0];
              joystickTouchId = t.identifier;
              joystickRect = joystick.getBoundingClientRect();
              handleMove(t);
            },
            { passive: true },
          );
          joystick.addEventListener(
            "touchmove",
            (e) => {
              for (const t of e.changedTouches) {
                if (t.identifier === joystickTouchId) {
                  handleMove(t);
                  break;
                }
              }
            },
            { passive: true },
          );
          const endJoy = (e) => {
            for (const t of e.changedTouches) {
              if (t.identifier === joystickTouchId) {
                joystickTouchId = null;
                this.touchX = 0;
                knob.style.transform = "translate(0px,0px)";
              }
            }
          };
          joystick.addEventListener("touchend", endJoy, { passive: true });
          joystick.addEventListener("touchcancel", endJoy, { passive: true });
          jumpBtn.addEventListener(
            "touchstart",
            (e) => {
              if (jumpTouchId !== null) return;
              jumpTouchId = e.changedTouches[0].identifier;
              this.touchJump = true;
            },
            { passive: true },
          );
          const endJump = (e) => {
            for (const t of e.changedTouches) {
              if (t.identifier === jumpTouchId) {
                jumpTouchId = null;
                this.touchJump = false;
              }
            }
          };
          jumpBtn.addEventListener("touchend", endJump, { passive: true });
          jumpBtn.addEventListener("touchcancel", endJump, { passive: true });
        }
        dir() {
          const right =
            this.keys["d"] || this.keys["arrowright"] || this.touchX === 1
              ? 1
              : 0;
          const left =
            this.keys["a"] || this.keys["arrowleft"] || this.touchX === -1
              ? 1
              : 0;
          const jump =
            this.keys["w"] ||
            this.keys["arrowup"] ||
            this.keys[" "] ||
            this.touchJump
              ? 1
              : 0;
          return { x: right - left, jump: jump };
        }
      }

      /* ================= COINS ================= */
      class CoinManager {
        constructor() {
          this.coins = [];
        }
        load(coinList) {
          this.coins = coinList.map((c) => ({ x: c.x, y: c.y, col: false }));
        }
        check(player) {
          const cx = player.x + player.w / 2;
          const cy = player.y + player.h / 2;
          for (const c of this.coins) {
            if (!c.col && Math.hypot(cx - c.x, cy - c.y) < 0.8) c.col = true;
          }
        }
        draw(ctx, tile) {
          ctx.fillStyle = "gold";
          for (const c of this.coins) {
            if (!c.col) {
              ctx.beginPath();
              ctx.arc(c.x * tile, c.y * tile, tile * 0.25, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      }

      /* ================= DOOR ================= */
      class Door {
        constructor(onTrigger) {
          this.x = 0;
          this.y = 0;
          this.w = 1.0;
          this.h = 1.6;
          this.onTrigger = onTrigger;
          this.triggered = false;
        }
        load(x, y) {
          this.x = x;
          this.y = y;
          this.triggered = false;
        }
        check(player) {
          if (
            !this.triggered &&
            player.x < this.x + this.w &&
            player.x + player.w > this.x &&
            player.y < this.y + this.h &&
            player.y + player.h > this.y
          ) {
            this.triggered = true;
            this.onTrigger();
          }
        }
        draw(ctx, tile) {
          ctx.fillStyle = "rgba(90, 50, 20, 0.9)";
          ctx.fillRect(
            this.x * tile,
            this.y * tile,
            this.w * tile,
            this.h * tile,
          );
          ctx.strokeStyle = "#2b190b";
          ctx.lineWidth = 3;
          ctx.strokeRect(
            this.x * tile,
            this.y * tile,
            this.w * tile,
            this.h * tile,
          );
          ctx.fillStyle = "gold";
          ctx.beginPath();
          ctx.arc(
            (this.x + 0.2) * tile,
            (this.y + 0.8) * tile,
            tile * 0.08,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }
      }

      /* ================= CANVAS ================= */
      class CanvasManager {
        constructor(canvas) {
          this.canvas = canvas;
          this.ctx = canvas.getContext("2d");
          window.addEventListener("resize", () => this.resize());
          this.resize();
        }
        resize() {
          const ratio = MAP_ROWS / VIEW_COLS;
          let w = innerWidth,
            h = w * ratio;
          if (h > innerHeight) {
            h = innerHeight;
            w = h / ratio;
          }
          this.canvas.width = w;
          this.canvas.height = h;
          this.tile = w / VIEW_COLS;
        }
      }

      /* ================= LIGHTSYSTEM ================= */
      class LightSystem {
        constructor(map, coinManager, door) {
          this.map = map;
          this.coins = coinManager;
          this.door = door;
        }
        draw(ctx, canvas, tile, player, cameraX) {
          const px = (player.x + player.w / 2) * tile;
          const py = (player.y + player.h / 2) * tile;
          const radius = tile * 6;
          const temp = document.createElement("canvas");
          temp.width = canvas.width;
          temp.height = canvas.height;
          const tctx = temp.getContext("2d");
          tctx.save();
          tctx.translate(-cameraX, 0);
          this.map.draw(tctx, tile);
          this.coins.draw(tctx, tile);
          this.door.draw(tctx, tile);
          tctx.restore();
          tctx.globalCompositeOperation = "destination-in";
          const screenPx = px - cameraX;
          const g = tctx.createRadialGradient(
            screenPx,
            py,
            0,
            screenPx,
            py,
            radius,
          );
          g.addColorStop(0, "rgba(255,255,255,1)");
          g.addColorStop(0.5, "rgba(255,255,255,0.5)");
          g.addColorStop(1, "rgba(255,255,255,0)");
          tctx.fillStyle = g;
          tctx.beginPath();
          tctx.arc(screenPx, py, radius, 0, Math.PI * 2);
          tctx.fill();
          ctx.fillStyle = "rgba(0,0,0,0.83)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(temp, 0, 0);
        }
      }

      /* ================= DYNAMIC PUZZLE SYSTEM ================= */
      class PuzzleSystem {
        constructor(canvasManager, onSolve) {
          this.cm = canvasManager;
          this.onSolve = onSolve;
          this.active = false;
          this.message = "";
          this.data = null;
          window.addEventListener("click", (e) => this.checkClick(e));
          window.addEventListener(
            "touchstart",
            (e) => {
              if (this.active) this.checkClick(e.touches[0]);
            },
            { passive: true },
          );
        }
        load(puzzleData) {
          this.data = puzzleData;
          this.message = "Λύσε το γρίφο για να περάσεις την πύλη!";
        }
        activate() {
          this.active = true;
          document.getElementById("touch-controls").style.opacity = "0";
        }
        checkClick(e) {
          if (!this.active || !this.data) return;
          const rect = this.cm.canvas.getBoundingClientRect();
          const mx = e.clientX - rect.left;
          const my = e.clientY - rect.top;
          const tile = this.cm.tile;
          const btnY_Min = 8.5 * tile;
          const btnY_Max = 10 * tile;

          // Κουμπί Αριστερά (A)
          if (
            mx >= 6 * tile &&
            mx <= 9 * tile &&
            my >= btnY_Min &&
            my <= btnY_Max
          ) {
            this.handleAnswer("A");
          }
          // Κουμπί Δεξιά (B)
          if (
            mx >= 11 * tile &&
            mx <= 14 * tile &&
            my >= btnY_Min &&
            my <= btnY_Max
          ) {
            this.handleAnswer("B");
          }
        }
        handleAnswer(choice) {
          if (choice === this.data.correct) {
            this.message = "ΣΩΣΤΟ! Φόρτωση επόμενης πίστας...";
            setTimeout(() => {
              this.active = false;
              if ("ontouchstart" in window || navigator.maxTouchPoints > 0)
                document.getElementById("touch-controls").style.opacity = "1";
              this.onSolve();
            }, 1500);
          } else {
            this.message = "Λάθος απάντηση! Δοκίμασε ξανά.";
          }
        }
        draw() {
          if (!this.active || !this.data) return;
          const ctx = this.cm.ctx;
          const tile = this.cm.tile;
          ctx.fillStyle = "rgba(25, 15, 10, 0.95)";
          ctx.fillRect(3 * tile, 3 * tile, 14 * tile, 9 * tile);
          ctx.strokeStyle = "#4a2c11";
          ctx.lineWidth = 4;
          ctx.strokeRect(3 * tile, 3 * tile, 14 * tile, 9 * tile);
          ctx.fillStyle = "#d1c4a5";
          ctx.textAlign = "center";
          ctx.font = `bold ${tile * 0.65}px 'Courier New'`;
          ctx.fillText(this.data.title, 10 * tile, 4.5 * tile);
          ctx.font = `${tile * 0.55}px 'Courier New'`;
          ctx.fillText(this.data.line1, 10 * tile, 5.6 * tile);
          ctx.fillText(this.data.line2, 10 * tile, 6.2 * tile);
          ctx.fillStyle = "#e67e22";
          ctx.font = `italic ${tile * 0.43}px 'Courier New'`;
          ctx.fillText(this.message, 10 * tile, 7.4 * tile);

          // Σχεδίαση Κουμπιών με τα δυναμικά κείμενα
          ctx.fillStyle = "#3a221d";
          ctx.fillRect(5.5 * tile, 8.5 * tile, 4 * tile, 1.5 * tile);
          ctx.fillStyle = "#d1c4a5";
          ctx.font = `bold ${tile * 0.45}px 'Courier New'`;
          ctx.fillText(this.data.optA, 7.5 * tile, 9.4 * tile);
          ctx.fillStyle = "#3a221d";
          ctx.fillRect(10.5 * tile, 8.5 * tile, 4 * tile, 1.5 * tile);
          ctx.fillStyle = "#d1c4a5";
          ctx.fillText(this.data.optB, 12.5 * tile, 9.4 * tile);
          ctx.textAlign = "left";
        }
      }

      /* ================= GAME MANAGER ================= */
      class Game {
        constructor() {
          this.canvas = new CanvasManager(document.getElementById("game"));
          this.map = new GameMap();
          this.player = new Player();
          this.coins = new CoinManager();
          this.input = new Input();
          this.last = 0;
          this.isPaused = false;
          this.cameraX = 0;

          // Ξεκινάμε από το Level 1
          this.currentLevelIndex = 1;

          this.door = new Door(() => {
            this.isPaused = true;
            this.puzzle.activate();
          });

          this.light = new LightSystem(this.map, this.coins, this.door);

          this.puzzle = new PuzzleSystem(this.canvas, () => {
            this.nextLevel();
          });

          // Φόρτωσε το level παράγοντάς το δυναμικά!
          this.loadLevel(this.currentLevelIndex);
          requestAnimationFrame((t) => this.loop(t));
        }

        loadLevel(levelNumber) {
          // Παράγουμε ΟΛΑ τα δεδομένα της πίστας On-The-Fly!
          const lvl = generateDynamicLevel(levelNumber);

          this.map.load(lvl.map);
          this.player.spawn(lvl.playerStart.x, lvl.playerStart.y);
          this.coins.load(lvl.coins);
          this.door.load(lvl.door.x, lvl.door.y);
          this.puzzle.load(lvl.puzzle);
          this.isPaused = false;
        }

        nextLevel() {
          this.currentLevelIndex++; // Πάει στο 2, 3, 4... στο άπειρο!
          this.loadLevel(this.currentLevelIndex);
        }

        loop(t) {
          const dt = Math.min((t - this.last) / 1000, 0.1);
          this.last = t;
          this.update(dt);
          this.draw();
          requestAnimationFrame((e) => this.loop(e));
        }
        update(dt) {
          if (this.isPaused) return;
          this.player.updatePhysics(this.input.dir(), this.map, dt);
          this.coins.check(this.player);
          this.door.check(this.player);

          // ΑΥΤΟΜΑΤΟ RESTART ΑΝ ΠΕΣΕΙ ΣΤΟ ΚΕΝΟ:
          if (this.player.y > MAP_ROWS) {
            this.loadLevel(this.currentLevelIndex);
          }

          const tile = this.canvas.tile;

          const targetCamX =
            (this.player.x + this.player.w / 2) * tile -
            this.canvas.canvas.width / 2;
          this.cameraX = Math.max(
            0,
            Math.min(targetCamX, MAP_COLS * tile - this.canvas.canvas.width),
          );
        }
        draw() {
          const ctx = this.canvas.ctx;
          const tile = this.canvas.tile;
          ctx.clearRect(
            0,
            0,
            this.canvas.canvas.width,
            this.canvas.canvas.height,
          );
          this.light.draw(
            ctx,
            this.canvas.canvas,
            tile,
            this.player,
            this.cameraX,
          );
          ctx.save();
          ctx.translate(-this.cameraX, 0);
          this.player.draw(ctx, tile);
          ctx.restore();
          this.puzzle.draw();
        }
      }

      /* ================= START ================= */
      new Game();
    </script>
