<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <title>2D Side-Scroller με Δυναμικά Levels & Γρίφους</title>
    <link rel="manifest" href="./manifest.json?v=2" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        background: #222;
        display: block;
      }

      /* TOUCH CONTROLS UI */
      #touch-controls {
        display: none;
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        height: 140px;
        pointer-events: none;
        z-index: 10;
      }
      .joystick-container {
        position: absolute;
        bottom: 10px;
        left: 30px;
        width: 100px;
        height: 100px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        pointer-events: auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .joystick-knob {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        transition: transform 0.05s linear;
      }
      .jump-button {
        position: absolute;
        bottom: 20px;
        right: 30px;
        width: 80px;
        height: 80px;
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-radius: 50%;
        pointer-events: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 16px;
      }
      .jump-button:active {
        background: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>

  <body>
    <canvas id="game"></canvas>

    <div id="touch-controls">
      <div class="joystick-container" id="joystick">
        <div class="joystick-knob" id="knob"></div>
      </div>
      <div class="jump-button" id="jump-btn">JUMP</div>
    </div>

    <!-- <script type="module" src="./main.js"></script> -->
  </body>
</html>
