<!doctype html><html lang="el"><head><meta charset="UTF-8"/><title>2D Side-Scroller με Δυναμικά Levels & Γρίφους</title><link rel="manifest" href="7847442aa6af9ffb4ec2.json"/><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1"/><style>body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-user-select:none;user-select:none}canvas{background:#222;display:block}#touch-controls{display:none;position:absolute;bottom:20px;left:0;width:100%;height:140px;pointer-events:none;z-index:10}.joystick-container{position:absolute;bottom:10px;left:30px;width:100px;height:100px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.3);border-radius:50%;pointer-events:auto;display:flex;align-items:center;justify-content:center}.joystick-knob{width:40px;height:40px;background:rgba(255,255,255,.5);border-radius:50%;transition:transform 50ms linear}.jump-button{position:absolute;bottom:20px;right:30px;width:80px;height:80px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:50%;pointer-events:auto;display:flex;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;font-weight:700;font-size:16px}.jump-button:active{background:rgba(255,255,255,.4)}</style><script defer="defer" src="bundle.js"></script></head><body><canvas id="game"></canvas><div id="touch-controls"><div class="joystick-container" id="joystick"><div class="joystick-knob" id="knob"></div></div><div class="jump-button" id="jump-btn">JUMP</div></div></body></html>
