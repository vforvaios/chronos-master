<!doctype html><html lang="el"><head><meta charset="UTF-8"/><title>2D Side-Scroller με Δυναμικά Levels & Γρίφους</title><link rel="manifest" href="./manifest.json?v=2"/><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1"/><style>body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-user-select:none;user-select:none}canvas{background:#222;display:block}#touch-controls{display:none;position:absolute;bottom:20px;left:0;width:100%;height:140px;pointer-events:none;z-index:10}.joystick-container{position:absolute;bottom:10px;left:30px;width:100px;height:100px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.3);border-radius:50%;pointer-events:auto;display:flex;align-items:center;justify-content:center}.joystick-knob{width:40px;height:40px;background:rgba(255,255,255,.5);border-radius:50%;transition:transform 50ms linear}.jump-button{position:absolute;bottom:20px;right:30px;width:80px;height:80px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:50%;pointer-events:auto;display:flex;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;font-weight:700;font-size:16px}.jump-button:active{background:rgba(255,255,255,.4)}#main-menu{position:absolute;display:flex;flex-direction:column;gap:20px;text-align:center;z-index:100;background:rgba(20,20,20,.95);padding:40px;border-radius:12px;border:2px solid #333;color:#fff;font-family:sans-serif}#main-menu button{padding:15px 30px;font-size:18px;font-weight:700;cursor:pointer;background:#e67e22;color:#fff;border:none;border-radius:6px;transition:.2s}#main-menu button:hover{background:#d35400}#btn-back-to-menu{position:absolute;top:15px;left:15px;z-index:200;padding:10px 18px;font-size:16px;font-weight:700;background-color:#e74c3c;color:#fff;border:none;border-radius:6px;cursor:pointer;box-shadow:0 4px 6px rgba(0,0,0,.3)}#btn-back-to-menu:active{transform:scale(.95)}</style><script defer="defer" src="bundle.js"></script></head><body><div id="main-menu"><h1>ΕΠΙΛΕΞΤΕ ΠΑΙΧΝΙΔΙ</h1><button id="btn-platformer">Dark Platformer</button> <button id="btn-doodle">Jumping Jumper</button></div><canvas id="game"></canvas><button id="btn-back-to-menu" style="display:none">← Μενού</button><div id="touch-controls"><div class="joystick-container" id="joystick"><div class="joystick-knob" id="knob"></div></div><div class="jump-button" id="jump-btn">JUMP</div></div></body></html>
